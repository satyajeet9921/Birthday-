<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --dark-pink: #590d22;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--soft-pink);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Initial Greeting State */
        #envelope-container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        #envelope-container:hover { transform: scale(1.1); }

        .heart-icon {
            font-size: 80px;
            color: var(--primary-pink);
            animation: pulse 1.5s infinite;
        }

        /* Main Content (Hidden initially) */
        #main-content {
            display: none;
            text-align: center;
            z-index: 10;
            padding: 20px;
            animation: fadeIn 2s ease-in;
        }

        .photo-frame {
            width: 220px;
            height: 220px;
            border: 8px solid white;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.3);
            margin: 0 auto 30px;
            position: relative;
        }

        .photo-frame img {
            width: 100%; height: 100%; object-fit: cover;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary-pink);
            font-size: 3rem;
            margin: 10px 0;
        }

        .caption-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 15px;
            color: var(--dark-pink);
            font-style: italic;
            max-width: 350px;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            color: var(--primary-pink);
            opacity: 0.6;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="envelope-container" onclick="revealSurprise()">
        <div class="heart-icon">❤️</div>
        <p style="color: #ff4d6d; font-weight: 600;">Tap to open your surprise</p>
    </div>

    <div id="main-content">
        <div class="photo-frame">
            <img src="https://via.placeholder.com/300" alt="Happy Birthday">
        </div>
        <h1>Happy Birthday, My Dear Wife!</h1>
        <div class="caption-box">
            "To the woman who makes every day brighter just by being in it. You are my greatest blessing and my favorite adventure. I love you endlessly!"
        </div>
    </div>

    <script>
        function revealSurprise() {
            document.getElementById('envelope-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startHearts();
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = Math.random() * 20 + 10 + 'px';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 300);
        }
    </script>
</body>
</html>
